<!DOCTYPE html>
<html lang="en">
<head>
  <title>Ocean Sky Match (Fixed)</title>
  <meta charset="utf-8">
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/"
    }
  }
  </script>
</head>

<body>
<script type="module">

import * as THREE from 'three';

import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { Sky } from 'three/addons/objects/Sky.js';
import { Water } from 'three/addons/objects/Water.js';

import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

let scene, camera, renderer, controls;
let water, sky, sun, composer;

init();

function init() {

  /* ================= RENDERER ================= */
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);

  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.1;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.physicallyCorrectLights = true;

  document.body.appendChild(renderer.domElement);

  /* ================= SCENE ================= */
  scene = new THREE.Scene();

  // 🔥 KEY: smooth horizon blending
  scene.fog = new THREE.Fog(0x000000, 1, 8000);

  /* ================= CAMERA ================= */
  camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, 20000);
  camera.position.set(30, 30, 100);

  /* ================= SUN ================= */
  sun = new THREE.Vector3();

  /* ================= WATER (UNCHANGED) ================= */
  const waterGeometry = new THREE.PlaneGeometry(10000, 10000);

  water = new Water(waterGeometry, {
    textureWidth: 512,
    textureHeight: 512,
    waterNormals: new THREE.TextureLoader().load(
      'https://threejs.org/examples/textures/waternormals.jpg',
      function (texture) {
        texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
      }
    ),
    sunDirection: new THREE.Vector3(),
    sunColor: 0xffffff,
    waterColor: 0x001e0f,
    distortionScale: 3.7,
    fog: scene.fog !== undefined
  });

  water.rotation.x = -Math.PI / 2;
  scene.add(water);

  /* ================= SKY (FIXED) ================= */
  sky = new Sky();
  sky.scale.setScalar(10000);
  scene.add(sky);

  const skyUniforms = sky.material.uniforms;

  // 🔥 tuned to match right image
  skyUniforms['turbidity'].value = 12;
  skyUniforms['rayleigh'].value = 1.8;
  skyUniforms['mieCoefficient'].value = 0.006;
  skyUniforms['mieDirectionalG'].value = 0.92;

  const parameters = {
    elevation: 1.5, // lower = stronger sunset glow
    azimuth: 180
  };

  function updateSun() {

    const phi = THREE.MathUtils.degToRad(90 - parameters.elevation);
    const theta = THREE.MathUtils.degToRad(parameters.azimuth);

    sun.setFromSphericalCoords(1, phi, theta);

    sky.material.uniforms['sunPosition'].value.copy(sun);
    water.material.uniforms['sunDirection'].value.copy(sun).normalize();
  }

  updateSun();

  /* ================= LIGHT ================= */
  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.copy(sun);
  scene.add(light);

  /* ================= CONTROLS ================= */
  controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 0, 0);
  controls.update();

  /* ================= POSTPROCESSING ================= */
  composer = new EffectComposer(renderer);

  const renderPass = new RenderPass(scene, camera);
  composer.addPass(renderPass);

  // 🔥 softer bloom (matches reference glow)
  const bloomPass = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    0.08,
    0.2,
    0.9
  );

  composer.addPass(bloomPass);

  window.addEventListener('resize', onResize);

  animate();
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {

  requestAnimationFrame(animate);

  water.material.uniforms['time'].value += 1.0 / 60.0;

  controls.update();

  composer.render();
}

</script>
</body>
</html>
